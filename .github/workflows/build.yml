name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python dependencies
      shell: cmd
      run: |
        cd python-backend
        python -m venv venv
        call venv\Scripts\activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download and Bundle FFmpeg and AI Models for Windows
      shell: pwsh
      run: |
        Write-Host "Downloading FFmpeg..."
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
        Write-Host "Extracting FFmpeg..."
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
        New-Item -ItemType Directory -Force -Path "python-backend/bin"
        Copy-Item -Path "ffmpeg_temp/ffmpeg-master-*/bin/ffmpeg.exe" -Destination "python-backend/bin/"
        Copy-Item -Path "ffmpeg_temp/ffmpeg-master-*/bin/ffprobe.exe" -Destination "python-backend/bin/"
        Remove-Item -Recurse -Force "ffmpeg.zip", "ffmpeg_temp"
        Write-Host "FFmpeg successfully bundled."

        Write-Host "Downloading Whisper base model..."
        New-Item -ItemType Directory -Force -Path "python-backend/bin/models"
        Invoke-WebRequest -Uri "https://openaipublic.azureedge.net/main/whisper/models/ed3a0b6b1c0edf879ad9b11b1af5a0e6ab5db9205f891f668f8b0e6c6326e34e/base.pt" -OutFile "python-backend/bin/models/base.pt"
        Write-Host "Whisper base model successfully bundled."

        Write-Host "Downloading Demucs htdemucs checkpoint..."
        New-Item -ItemType Directory -Force -Path "python-backend/bin/checkpoints"
        Invoke-WebRequest -Uri "https://dl.fbaipublicfiles.com/demucs/hybridtransformer/955717e8-872c5565.th" -OutFile "python-backend/bin/checkpoints/955717e8-872c5565.th"
        Write-Host "Demucs checkpoint successfully bundled."


    - name: Build Python backend binary
      shell: cmd
      run: |
        cd python-backend
        call venv\Scripts\activate
        pyinstaller dubify_backend.spec

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Node dependencies
      run: |
        npm ci

    - name: Build and Package Electron App
      run: |
        npm run electron:build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: khmer-video-dubber-windows
        path: dist-electron/*.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist-electron/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
